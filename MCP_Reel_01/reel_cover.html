<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Cover — MCP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800;900&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
:root{--blue:#1D3A8A;--ink:#0A0A0A;--muted:#5A5F66;--hair:#E9EBEF;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html,body{height:100%;background:#0c0c0d;overflow:hidden;font-family:'Inter',system-ui,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
#stage{position:relative;width:1080px;height:1920px;transform-origin:center;overflow:hidden;
  background:linear-gradient(168deg,#FBFBFE 0%,#F3F5FB 55%,#EEF1F9 100%);}
#grid{position:absolute;inset:0;background-image:radial-gradient(rgba(29,58,138,.06) 1.5px,transparent 1.5px);
  background-size:46px 46px;mask-image:linear-gradient(180deg,transparent,#000 18%,#000 84%,transparent);}
#wash{position:absolute;inset:0;background:radial-gradient(60% 40% at 50% 38%,rgba(29,58,138,.10),transparent 70%);}

/* everything important lives inside the center 1:1 square (y 420–1500) */
.block{position:absolute;left:0;right:0;top:420px;height:1080px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:0 90px;gap:0;}

.brand{display:flex;align-items:center;gap:16px;margin-bottom:54px;}
.brand .ic{width:64px;height:64px;background:url('./favicon-512.png') no-repeat center/contain;border-radius:10px;}
.brand b{font-family:'Inter Tight';font-weight:800;font-size:40px;letter-spacing:-.5px;color:var(--ink);}
.brand span{font-family:'Inter';font-weight:600;font-size:17px;letter-spacing:5px;color:var(--muted);}

.kicker{font-family:'JetBrains Mono';font-weight:600;font-size:30px;letter-spacing:8px;color:var(--blue);margin-bottom:34px;text-transform:uppercase;}
.q{font-family:'Inter Tight';font-weight:900;letter-spacing:-.05em;line-height:.92;color:var(--ink);font-size:150px;}
.big{font-family:'Inter Tight';font-weight:900;letter-spacing:-.05em;line-height:.9;font-size:300px;margin-top:10px;color:var(--ink);}
.hl{display:inline-block;color:#fff;background:var(--blue);border-radius:18px;padding:0 .14em;box-shadow:0 26px 60px rgba(29,58,138,.30);}
.sub{margin-top:48px;font-family:'Inter';font-weight:600;font-size:46px;color:var(--muted);line-height:1.25;max-width:840px;}
.pill{margin-top:42px;display:inline-flex;align-items:center;gap:14px;font-family:'Inter Tight';font-weight:800;font-size:34px;
  color:#fff;background:var(--ink);border-radius:999px;padding:18px 34px;}
.pill .tri{width:0;height:0;border-left:20px solid #fff;border-top:12px solid transparent;border-bottom:12px solid transparent;}

/* grid + safe-zone guide (toggle) */
#guide{position:absolute;inset:0;z-index:20;pointer-events:none;display:none;}
#guide.on{display:block;}
#guide .sq{position:absolute;left:0;right:0;top:420px;height:1080px;border:3px dashed rgba(29,58,138,.55);}
#guide .lbl{position:absolute;top:430px;left:24px;font-family:'JetBrains Mono';font-size:24px;color:var(--blue);font-weight:600;}
#guide .top,#guide .bot{position:absolute;left:0;right:0;background:rgba(225,75,60,.10);border:2px dashed rgba(225,75,60,.4);}
#guide .top{top:0;height:420px;}#guide .bot{bottom:0;height:420px;}

#hint{position:fixed;bottom:12px;left:12px;color:#888;font-family:monospace;font-size:12px;z-index:30;}
button.ctrl{font-family:monospace;font-size:12px;background:#1c1c1f;color:#ccc;border:1px solid #333;border-radius:6px;padding:5px 10px;margin-left:8px;cursor:pointer;}
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <div id="grid"></div><div id="wash"></div>

  <div class="block">
    <div class="brand"><span class="ic"></span><b>Rabbithole<br><span style="font-size:17px;letter-spacing:5px">CONSULTING</span></b></div>
    <div class="kicker">AI · explained</div>
    <div class="q">What is an</div>
    <div class="big"><span class="hl">MCP</span>?</div>
    <div class="sub">The 3 letters all of AI is saying — in plain English.</div>
    <div class="pill"><span class="tri"></span> 90-second breakdown</div>
  </div>

  <div id="guide">
    <div class="top"></div><div class="bot"></div>
    <div class="sq"></div>
    <div class="lbl">↑ instagram grid crop — keep all text inside this square ↑</div>
  </div>
</div></div>

<div id="hint">1080×1920 cover · screenshot the stage<button class="ctrl" id="g">grid guide</button> <b>title-safe = center square</b></div>
<script>
const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1080,innerHeight/1920);stage.style.transform=`scale(${s})`;}
addEventListener('resize',fit);fit();
g.onclick=()=>document.getElementById('guide').classList.toggle('on');
</script>
</body>
</html>

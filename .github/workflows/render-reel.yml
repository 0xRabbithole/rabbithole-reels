name: Render Reel → MP4

# Permanent unattended renderer. Runs on a cloud VM (no 45s limit, full system access),
# turns a reel .html into a 1080x1920 MP4 — no screen recording, nobody touches anything.
#
# Trigger it two ways:
#   • Manually: Actions tab → "Render Reel → MP4" → Run workflow (pick the html + length)
#   • Automatically: every push that changes a reel .html renders it (see the `push:` block)

on:
  workflow_dispatch:
    inputs:
      html:
        description: "Reel HTML (path from repo root)"
        required: true
        default: "MCP_Reel_01/mcp_reel_visual.html"
      seconds:
        description: "Record seconds (reel length + ~2)"
        required: true
        default: "90"
      voice:
        description: "Optional voiceover .mp3 (path from repo root) — blank = silent video"
        required: false
        default: ""
      out:
        description: "Output filename"
        required: true
        default: "reel.mp4"
      schedule:
        description: "Also schedule to Buffer? (true/false)"
        required: false
        default: "false"
      caption_file:
        description: "Caption .txt (path from repo root) — used when scheduling"
        required: false
        default: "MCP_Reel_01/caption.txt"
      services:
        description: "Buffer channels to post to (comma list)"
        required: false
        default: "instagram,tiktok"
      due_at:
        description: "Schedule time, ISO 8601 UTC (blank = add to Buffer queue)"
        required: false
        default: ""
  push:
    paths:
      - "**/mcp_reel_visual.html"
      - "**/*_reel_visual.html"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # needed to publish the MP4 as a public Release asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Playwright + Chromium (with system deps)
        working-directory: _REEL_ENGINE/capture
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Generate voiceover (ElevenLabs · Ivanna)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID }}
        run: |
          HTML="${{ github.event.inputs.html || 'MCP_Reel_01/mcp_reel_visual.html' }}"
          REEL_DIR="$GITHUB_WORKSPACE/$(dirname "$HTML")"
          if [ -f "$REEL_DIR/voiceover.txt" ] && [ -n "$ELEVENLABS_API_KEY" ] && [ -n "$ELEVENLABS_VOICE_ID" ]; then
            echo "Generating Ivanna voiceover from voiceover.txt ..."
            BODY=$(jq -Rs '{text: ., model_id:"eleven_multilingual_v2", voice_settings:{stability:0.35, similarity_boost:0.8, style:0.35, use_speaker_boost:true}}' "$REEL_DIR/voiceover.txt")
            curl -sS -X POST "https://api.elevenlabs.io/v1/text-to-speech/$ELEVENLABS_VOICE_ID" \
              -H "xi-api-key: $ELEVENLABS_API_KEY" -H "Content-Type: application/json" \
              -d "$BODY" --output "$REEL_DIR/voice.mp3"
            if file "$REEL_DIR/voice.mp3" | grep -qiE 'audio|mpeg'; then echo "✓ voice.mp3 generated"; else echo "::warning::ElevenLabs returned no audio (check key/voice id/credits)"; head -c 400 "$REEL_DIR/voice.mp3"; rm -f "$REEL_DIR/voice.mp3"; fi
          else
            echo "No voiceover.txt or ELEVENLABS_API_KEY/ELEVENLABS_VOICE_ID not set → rendering silent."
          fi

      # Cover is generated BEFORE the render so render.sh can burn it in as the opening
      # frame (the platform auto-cover = first frame; this keeps it from being the blank hold).
      - name: Generate cover (first slide)
        working-directory: _REEL_ENGINE/capture
        run: |
          HTML="${{ github.event.inputs.html || 'MCP_Reel_01/mcp_reel_visual.html' }}"
          mkdir -p "$GITHUB_WORKSPACE/_renders"
          node capture_cover.js "$GITHUB_WORKSPACE/$HTML" "$GITHUB_WORKSPACE/_renders/cover.png" 3600 \
            || echo "::warning::cover generation failed (will render without a cover poster)"

      - name: Render reel
        working-directory: _REEL_ENGINE/capture
        run: |
          HTML="${{ github.event.inputs.html || 'MCP_Reel_01/mcp_reel_visual.html' }}"
          SECS="${{ github.event.inputs.seconds || '90' }}"
          OUTNAME="${{ github.event.inputs.out || 'reel.mp4' }}"
          REEL_DIR="$GITHUB_WORKSPACE/$(dirname "$HTML")"
          VOICE_ARG=""
          if [ -f "$REEL_DIR/voice.mp3" ]; then VOICE_ARG="$REEL_DIR/voice.mp3";
          elif [ -n "${{ github.event.inputs.voice }}" ]; then VOICE_ARG="$GITHUB_WORKSPACE/${{ github.event.inputs.voice }}"; fi
          COVER_ARG=""
          if [ -f "$GITHUB_WORKSPACE/_renders/cover.png" ]; then COVER_ARG="$GITHUB_WORKSPACE/_renders/cover.png"; fi
          bash render.sh "$GITHUB_WORKSPACE/$HTML" "$SECS" "$GITHUB_WORKSPACE/_renders/$OUTNAME" "$VOICE_ARG" "$COVER_ARG"

      - name: Upload MP4
        uses: actions/upload-artifact@v4
        with:
          name: rendered-reel
          path: _renders/*.mp4
          if-no-files-found: error
          retention-days: 30

      # ---- Publish a public Release (MP4 + cover) -----------------------------
      # Buffer's API needs media at a PUBLIC URL; a GitHub Release asset is one.
      # Runs on every manual dispatch so each render has a public MP4 + cover to
      # review. Scheduling to Buffer is a separate, opt-in step below.
      - name: Publish MP4 + cover as a public Release asset
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTNAME="${{ github.event.inputs.out || 'reel.mp4' }}"
          TAG="reel-${{ github.run_id }}"
          ASSETS=( "_renders/$OUTNAME" )
          [ -f "_renders/cover.png" ] && ASSETS+=( "_renders/cover.png" )
          gh release create "$TAG" "${ASSETS[@]}" \
            --title "$OUTNAME" \
            --notes "Auto-published rendered reel + cover." \
            --repo "$GITHUB_REPOSITORY"
          BASE="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          echo "video_url=$BASE/$OUTNAME" >> "$GITHUB_OUTPUT"
          echo "Public MP4 URL: $BASE/$OUTNAME"
          if [ -f "_renders/cover.png" ]; then
            echo "cover_url=$BASE/cover.png" >> "$GITHUB_OUTPUT"
            echo "Public cover URL: $BASE/cover.png"
          fi

      - name: Schedule on Buffer
        if: ${{ github.event.inputs.schedule == 'true' }}
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
        run: |
          if [ -z "$BUFFER_TOKEN" ]; then
            echo "::error::BUFFER_TOKEN secret is not set — add it in repo Settings → Secrets."
            exit 1
          fi
          CAPTION="${{ github.event.inputs.caption_file || 'MCP_Reel_01/caption.txt' }}"
          DUE="${{ github.event.inputs.due_at }}"
          SERVICES="${{ github.event.inputs.services || 'instagram,tiktok' }}"
          ARGS=( --video-url "${{ steps.release.outputs.video_url }}" --services "$SERVICES" )
          if [ -n "${{ steps.release.outputs.cover_url }}" ]; then ARGS+=( --thumb-url "${{ steps.release.outputs.cover_url }}" ); fi
          if [ -f "$GITHUB_WORKSPACE/$CAPTION" ]; then ARGS+=( --caption-file "$GITHUB_WORKSPACE/$CAPTION" ); fi
          if [ -n "$DUE" ]; then ARGS+=( --due-at "$DUE" ); fi
          node "$GITHUB_WORKSPACE/_REEL_ENGINE/post_to_buffer.mjs" "${ARGS[@]}"
